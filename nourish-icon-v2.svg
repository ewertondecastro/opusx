<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#FDF8F0"/>

  <!-- Outer ring — full circle track -->
  <circle cx="256" cy="230" r="148" fill="none" stroke="#EDE4D0" stroke-width="20"/>
  <!-- Outer ring — gold arc, 270 degrees -->
  <circle cx="256" cy="230" r="148" fill="none" stroke="#B8924A" stroke-width="20"
    stroke-linecap="round"
    stroke-dasharray="700 233"
    transform="rotate(-135 256 230)"/>

  <!-- Middle ring — full circle track -->
  <circle cx="256" cy="230" r="110" fill="none" stroke="#EDE4D0" stroke-width="18"/>
  <!-- Middle ring — jade arc, 240 degrees -->
  <circle cx="256" cy="230" r="110" fill="none" stroke="#4A8A6A" stroke-width="18"
    stroke-linecap="round"
    stroke-dasharray="461 230"
    transform="rotate(-120 256 230)"/>

  <!-- Inner ring — full circle track -->
  <circle cx="256" cy="230" r="74" fill="none" stroke="#EDE4D0" stroke-width="16"/>
  <!-- Inner ring — sky arc, 200 degrees -->
  <circle cx="256" cy="230" r="74" fill="none" stroke="#4A7AB8" stroke-width="16"
    stroke-linecap="round"
    stroke-dasharray="258 207"
    transform="rotate(-100 256 230)"/>

  <!-- Center dot -->
  <circle cx="256" cy="230" r="12" fill="#B8924A"/>

  <!-- Wordmark -->
  <text
    x="256" y="424"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="48"
    font-weight="400"
    letter-spacing="10"
    fill="#B8924A">NOURISH</text>

</svg>
